  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1a56db;
      --primary-light: #e8f0fe;
      --primary-dark: #1240a8;
      --accent: #f59e0b;
      --accent-light: #fef3c7;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --bg: #f8faff;
      --bg-white: #ffffff;
      --bg-card: #ffffff;
      --border: #e5e7eb;
      --border-light: #f3f4f6;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);

      --shadow-lg: 0 12px 40px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.05);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 18px;
    }

    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); line-height: 1.6; min-height: 100vh; }

    /* ── NAVBAR ── */
    .navbar { position: sticky; top: 0; z-index: 200; background: rgba(255,255,255,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); box-shadow: var(--shadow-sm); }
    .navbar-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 66px; }
    .navbar-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; cursor: pointer; }
    .brand-icon { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, var(--primary), #6366f1); display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; font-weight: 700; box-shadow: 0 4px 12px rgba(26,86,219,0.35); flex-shrink: 0; }
    .brand-text { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--text-primary); }
    .brand-text span { color: var(--primary); }

    .nav-links { display: flex; align-items: center; gap: 4px; }
    .nav-link { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text-secondary); transition: all .2s; border: none; background: none; font-family: 'DM Sans',sans-serif; white-space: nowrap; }
    .nav-link:hover, .nav-link.active { color: var(--primary); background: var(--primary-light); }
    .nav-btn { padding: 9px 20px; border-radius: var(--radius-sm); background: var(--primary); color: white; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; box-shadow: 0 2px 8px rgba(26,86,219,0.3); font-family: 'DM Sans',sans-serif; white-space: nowrap; }
    .nav-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }

    /* ── HAMBURGER ── */
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 6px; border: none; background: none; border-radius: var(--radius-sm); transition: background .2s; }
    .hamburger:hover { background: var(--primary-light); }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--text-primary); border-radius: 2px; transition: all .3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── MOBILE MENU ── */
    .mobile-menu { display: none; position: fixed; top: 66px; left: 0; right: 0; bottom: 0; background: white; z-index: 199; padding: 20px; flex-direction: column; gap: 8px; overflow-y: auto; border-top: 1px solid var(--border); }
    .mobile-menu.open { display: flex; }
    .mobile-nav-link { padding: 14px 18px; border-radius: var(--radius); font-size: 16px; font-weight: 500; cursor: pointer; color: var(--text-primary); border: 1px solid var(--border); background: white; text-align: left; transition: all .2s; font-family: 'DM Sans',sans-serif; }

    /* ── KEYBOARD HINT ── */

    /* ── HERO ── */

    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(30px, 5vw, 60px); font-weight: 700; line-height: 1.15; color: var(--text-primary); max-width: 700px; margin-bottom: 16px; }

    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 48px; }
    .btn-primary { padding: 13px 28px; border-radius: var(--radius-sm); background: var(--primary); color: white; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; box-shadow: 0 4px 16px rgba(26,86,219,0.35); font-family: 'DM Sans',sans-serif; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,86,219,0.4); }
    .btn-outline { padding: 13px 28px; border-radius: var(--radius-sm); background: white; color: var(--primary); font-size: 15px; font-weight: 600; cursor: pointer; border: 2px solid var(--primary); transition: all .2s; font-family: 'DM Sans',sans-serif; }
    .btn-outline:hover { background: var(--primary-light); }
    .hero-stats { display: flex; gap: 40px; flex-wrap: wrap; }
    .stat-item { text-align: left; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: var(--primary); line-height: 1; }
    .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    /* ── QUICK SEARCH IN HERO ── */
    .hero-search { background: white; border-radius: var(--radius); border: 2px solid var(--border); display: flex; align-items: center; gap: 10px; padding: 12px 18px; max-width: 560px; margin-bottom: 32px; box-shadow: var(--shadow-sm); transition: border-color .2s, box-shadow .2s; }
    .hero-search:focus-within { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(26,86,219,0.1); }
    .hero-search input { flex: 1; border: none; outline: none; font-size: 15px; font-family: 'DM Sans',sans-serif; color: var(--text-primary); background: none; }
    .hero-search input::placeholder { color: var(--text-muted); }
    .hero-search-btn { padding: 8px 18px; border-radius: var(--radius-sm); background: var(--primary); color: white; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans',sans-serif; white-space: nowrap; transition: background .2s; }
    .hero-search-btn:hover { background: var(--primary-dark); }

    /* ── DOMAINS BAR ── */
    .domains-bar { background: white; border-bottom: 1px solid var(--border); padding: 0 24px; }
    .domains-inner { max-width: 1280px; margin: 0 auto; display: flex; gap: 8px; overflow-x: auto; padding: 12px 0; scrollbar-width: none; }
    .domains-inner::-webkit-scrollbar { display: none; }
    .domain-chip { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 100px; white-space: nowrap; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: white; color: var(--text-secondary); transition: all .2s; flex-shrink: 0; font-family: 'DM Sans',sans-serif; }
    .domain-chip:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .domain-chip.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 2px 8px rgba(26,86,219,0.3); }
    .chip-count { background: rgba(255,255,255,0.25); border-radius: 100px; padding: 1px 7px; font-size: 11px; font-weight: 600; }
    .domain-chip:not(.active) .chip-count { background: var(--border-light); color: var(--text-muted); }

    /* ── SECTION ── */
    .section { padding: 44px 24px; }
    .section-inner { max-width: 1280px; margin: 0 auto; }
    .section-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--text-primary); }
    .section-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .see-all { font-size: 13px; font-weight: 600; color: var(--primary); cursor: pointer; background: none; border: none; padding: 6px 12px; border-radius: var(--radius-sm); transition: background .2s; font-family: 'DM Sans',sans-serif; }
    .see-all:hover { background: var(--primary-light); }

    /* ── SEARCH BAR ── */
    .search-section { background: white; border-bottom: 1px solid var(--border); padding: 18px 24px; position: sticky; top: 66px; z-index: 100; }
    .search-inner { max-width: 1280px; margin: 0 auto; }
    .search-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .search-box { flex: 1; min-width: 200px; display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 9px 14px; transition: all .2s; }
    .search-box:focus-within { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
    .search-box input { flex: 1; border: none; background: none; outline: none; font-size: 14px; font-family: 'DM Sans',sans-serif; color: var(--text-primary); min-width: 0; }
    .search-icon { color: var(--text-muted); font-size: 15px; flex-shrink: 0; }
    .filter-select { padding: 9px 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); font-size: 13px; font-family: 'DM Sans',sans-serif; color: var(--text-secondary); cursor: pointer; outline: none; transition: border-color .2s; min-width: 120px; }
    .filter-select:focus { border-color: var(--primary); background: white; }
    .search-meta-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; flex-wrap: wrap; gap: 8px; }
    .results-count { font-size: 13px; color: var(--text-muted); }
    .results-count strong { color: var(--primary); }

    /* ── CLEAR FILTERS BUTTON ── */
    .clear-filters-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 100px; background: #fef3c7; color: #92400e; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid #fde68a; transition: all .2s; font-family: 'DM Sans',sans-serif; }
    .clear-filters-btn:hover { background: #fde68a; }

    /* ── ACTIVE FILTERS STRIP ── */
    .active-filters { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .filter-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 100px; background: var(--primary-light); color: var(--primary); font-size: 12px; font-weight: 500; border: 1px solid rgba(26,86,219,0.2); }
    .filter-pill button { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; margin-left: 2px; }

    /* ── PROJECT GRID ── */
    .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }

    /* ── PROJECT CARD ── */
    .project-card { background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; transition: all .25s; cursor: pointer; display: flex; flex-direction: column; }
    .project-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: rgba(26,86,219,0.2); }
    .project-card:focus-visible { outline: 3px solid var(--primary); outline-offset: 2px; }
    .card-image { height: 130px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .card-image-icon { font-size: 46px; opacity: 0.3; }
    .card-year-badge { position: absolute; top: 10px; right: 10px; background: white; color: var(--text-secondary); font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 100px; border: 1px solid var(--border); }

    .new-badge { position: absolute; top: 10px; left: 10px; background: var(--success); color: white; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 100px; letter-spacing: 0.5px; }
    .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card-domain-badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
    .card-title { font-size: 15px; font-weight: 600; color: var(--text-primary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; }
    .card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-techs { display: flex; gap: 5px; flex-wrap: wrap; }
    .tech-tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; background: var(--border-light); color: var(--text-secondary); border: 1px solid var(--border); }
    .card-footer { padding: 10px 16px; border-top: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .btn-view { flex: 1; padding: 8px; border-radius: var(--radius-sm); background: var(--primary-light); color: var(--primary); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; font-family: 'DM Sans',sans-serif; }
    .btn-view:hover { background: var(--primary); color: white; }
    .btn-save { padding: 8px 10px; border-radius: var(--radius-sm); background: white; color: var(--text-muted); font-size: 15px; cursor: pointer; border: 1px solid var(--border); transition: all .2s; }
    .btn-save:hover, .btn-save.saved { background: #fef3c7; color: #92400e; border-color: #fde68a; }
    @keyframes highlightNew { 0%,100% { box-shadow: var(--shadow-sm); border-color: var(--border); } 30% { box-shadow: 0 0 0 3px rgba(16,185,129,0.4), var(--shadow-md); border-color: var(--success); } }
    .project-card.newly-added { animation: highlightNew 2.5s ease; }

    /* ── DOMAIN COLORS ── */
    .domain-ai { background: #dbeafe; color: #1d4ed8; }
    .domain-iot { background: #d1fae5; color: #065f46; }
    .domain-cloud { background: #e0e7ff; color: #4338ca; }
    .domain-blockchain { background: #fef3c7; color: #92400e; }
    .domain-cyber { background: #fee2e2; color: #991b1b; }
    .domain-ml { background: #f3e8ff; color: #6b21a8; }
    .domain-data { background: #fce7f3; color: #9d174d; }
    .domain-robotics { background: #ccfbf1; color: #134e4a; }
    .domain-cv { background: #ffedd5; color: #9a3412; }
    .domain-nlp { background: #ede9fe; color: #5b21b6; }
    .domain-5g { background: #cffafe; color: #155e75; }
    .domain-edge { background: #ecfdf5; color: #14532d; }

    /* ── CARD BG by domain ── */
    .card-bg-ai { background: linear-gradient(135deg,#dbeafe,#e0e7ff); }
    .card-bg-ml { background: linear-gradient(135deg,#f3e8ff,#e0e7ff); }
    .card-bg-blockchain { background: linear-gradient(135deg,#fef9c3,#fef3c7); }
    .card-bg-iot { background: linear-gradient(135deg,#d1fae5,#ccfbf1); }
    .card-bg-cyber { background: linear-gradient(135deg,#fee2e2,#fce7f3); }
    .card-bg-cloud { background: linear-gradient(135deg,#e0e7ff,#dbeafe); }
    .card-bg-cv { background: linear-gradient(135deg,#ffedd5,#fef3c7); }
    .card-bg-nlp { background: linear-gradient(135deg,#ede9fe,#f3e8ff); }
    .card-bg-robotics { background: linear-gradient(135deg,#ccfbf1,#d1fae5); }
    .card-bg-edge { background: linear-gradient(135deg,#ecfdf5,#d1fae5); }
    .card-bg-data { background: linear-gradient(135deg,#fce7f3,#f3e8ff); }
    .card-bg-5g { background: linear-gradient(135deg,#cffafe,#e0e7ff); }
    .card-bg-default { background: linear-gradient(135deg,#f0f4ff,#e8f0fe); }

    /* ── POPULARITY ── */
    .popularity-bar { margin-top: 6px; }
    .popularity-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; display: flex; justify-content: space-between; }
    .bar-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }

    /* ── DETAIL PAGE ── */
    .detail-page { max-width: 920px; margin: 0 auto; padding: 32px 24px 60px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); background: white; color: var(--text-secondary); border: 1px solid var(--border); font-size: 13px; font-weight: 500; cursor: pointer; margin-bottom: 22px; transition: all .2s; font-family: 'DM Sans',sans-serif; }

    .btn-cite:hover { background: var(--primary-light); }

  title: "AI-Based Personalized Learning System",
  domain: "Artificial Intelligence",
  abstract: "An adaptive e-learning platform that constructs dynamic learner knowledge graphs and applies a Deep Knowledge Tracing (DKT) model augmented with attention mechanisms to predict concept mastery and recommend next learning items. The recommendation engine balances explorative new content with consolidation exercises using a multi-armed bandit policy optimised for long-term knowledge retention. Evaluated in a 14-week study with 3,800 university students across Mathematics, Data Structures, and Python programming courses, the system improved post-test scores by 23.4% over static curricula and reduced time-to-mastery by 31%. Real-time progress dashboards provide actionable insights to both learners and instructors.",

  domain: "IoT",
  abstract: "A comprehensive IoT-based patient monitoring infrastructure deployed across a 400-bed hospital, integrating wearable biosensors, smart IV drip controllers, bed-occupancy pressure mats, and ambient environment sensors into a unified cloud-edge platform. Vital signs including ECG, SpO2, blood pressure, temperature, and respiratory rate are continuously streamed via BLE 5.2 to edge gateways running on-device anomaly detection using a lightweight LSTM model. Critical alerts are delivered to nursing staff within 1.8 seconds on average. The platform reduced nurse response time by 41%, decreased false alarm rate by 63% compared to legacy threshold-based monitors, and achieved 99.98% data uptime over a 12-month clinical deployment validated against HL7 FHIR standards.",

  id: 62,
  title: "IoT-Based Smart Electricity Monitoring System",
  domain: "IoT",
  abstract: "A non-intrusive load monitoring (NILM) system using a network of smart plugs, whole-home current transformers, and a Raspberry Pi edge gateway to provide appliance-level electricity disaggregation and real-time energy analytics. A CNN-LSTM hybrid classifies 24 appliance types from current and voltage waveforms sampled at 10 kHz with 94.3% per-appliance F1-score. The mobile dashboard displays live consumption, cost forecasts, carbon footprint, and anomaly alerts for devices drawing abnormal power. Field trials across 80 residential households over 6 months demonstrated average energy savings of 18.7% through behavioural feedback and automated scheduling recommendations integrated with MQTT-based smart plug control.",

  title: "IoT-Based Smart Vehicle Monitoring System",
  domain: "IoT",
  abstract: "An OBD-II and CAN bus-integrated IoT telematics platform providing real-time monitoring of engine health, driver behaviour, fuel efficiency, and predictive maintenance for commercial fleet management. A Raspberry Pi 4 onboard unit collects 47 vehicle parameters at 10 Hz, compresses data using delta encoding, and transmits via 4G LTE to a cloud backend. A gradient-boosted fault prediction model trained on 2.3 million km of fleet data achieves 91.7% precision for detecting component failures 72 hours before occurrence. GPS geofencing, harsh-driving event detection, and automated insurance telematics reports are generated per vehicle. Deployed across a 120-vehicle logistics fleet, the system reduced unplanned breakdowns by 54% and fuel costs by 12%.",

  id: 64,
  title: "IoT-Based Smart Disaster Warning System",
  domain: "IoT",
  abstract: "A multi-hazard early warning network combining seismic MEMS accelerometers, flood ultrasonic water-level sensors, wildfire gas and optical smoke detectors, and landslide tilt sensors into a solar-powered LoRaWAN mesh. Each node performs local signal processing on an STM32 microcontroller using pre-trained threshold models; confirmed events trigger sub-10-second community alerts via SMS gateway, siren actuators, and a public mobile app. The system was deployed across 38 monitoring nodes covering a 120 km² high-risk mountain region. During a 9-month evaluation period it issued zero false alarms, correctly detected 4 flash-flood precursor events with an average 23-minute warning lead time, enabling safe evacuation of 1,400 residents.",

  id: 65,
  title: "IoT-Based Smart Office Automation System",
  domain: "IoT",
  abstract: "An occupancy-aware smart office platform integrating PIR motion sensors, CO2 and VOC air-quality monitors, smart power strips, motorised blind controllers, and IP cameras into a unified BACnet/IP and MQTT hybrid building management system. A reinforcement learning agent running on a local edge server learns per-room occupancy patterns and dynamically adjusts HVAC setpoints, lighting colour temperature, and blind positions to optimise simultaneously for occupant comfort (PMV index) and energy efficiency. Deployed in a 3,200 m² corporate office with 240 employees, the system achieved 27% reduction in HVAC energy, 33% in lighting energy, and maintained average occupant comfort scores of 4.3/5 over a 10-month monitoring period without manual overrides.",

  id: 66,
  title: "IoT-Based Smart Traffic Light System",
  domain: "IoT",
  abstract: "An adaptive traffic signal control system embedding vehicle-counting radar sensors and pedestrian inductive loop detectors at each approach of 32 signalised intersections, feeding real-time occupancy data to a centralised multi-agent deep Q-network (DQN) controller via 5G NR sidelink. The controller dynamically adjusts green-phase durations and coordinates platoon progression across the arterial corridor. Compared to fixed-cycle Webster timing and SCOOT actuated control, the system reduces average vehicle delay by 38% and pedestrian wait time by 29% in simulation validated against SUMO microsimulation. A 6-month live deployment on a 4.2 km urban corridor demonstrated 21% throughput improvement during peak hours and integration with V2I communication for emergency vehicle preemption.",

  title: "IoT-Based Smart City Infrastructure Monitoring System",
  domain: "IoT",
  abstract: "A city-scale structural and environmental health monitoring network deploying 850 heterogeneous IoT nodes across bridges, road surfaces, water mains, streetlights, and storm drains throughout a metropolitan area. Vibration MEMS sensors detect bridge structural anomalies using an on-device FFT and threshold classifier; moisture and crack sensors on road surfaces trigger pothole prediction with 87.6% accuracy. All nodes communicate over a city-owned LoRaWAN network with LTE-M fallback. A digital twin built in Unity 3D visualises real-time sensor readings and predictive maintenance schedules. Over 18 months, the system identified 3 bridge sections requiring urgent reinforcement and reduced infrastructure emergency repair costs by $1.9M through proactive maintenance prioritisation.",

  id: 68,
  title: "IoT-Based Smart Security Alarm System",
  domain: "IoT",
  abstract: "A multi-sensor residential and commercial intrusion detection platform integrating PIR motion detectors, door/window magnetic reed switches, glass-break acoustic sensors, and a dual-band microwave radar into a Zigbee mesh network managed by a local hub running on Raspberry Pi 5. A lightweight CNN-based audio classifier distinguishes genuine glass-break events from false triggers (e.g., similar-frequency sounds) with 97.4% precision, reducing false alarms by 71% versus threshold-based systems. Verified events trigger instant push notifications, live camera snapshot delivery, and optional direct-dial to a monitoring centre via SIP. An end-to-end AES-128 encrypted communication channel prevents replay and man-in-the-middle attacks. Evaluated in 55 residential sites over 8 months with zero missed intrusions.",

  id: 69,
  title: "IoT-Based Smart Warehouse Monitoring System",
  domain: "IoT",
  abstract: "An end-to-end IoT platform for automated warehouse asset tracking, environmental compliance, and equipment health monitoring across a 25,000 m² fulfilment centre. UHF RFID readers and BLE asset tags provide real-time inventory location with sub-metre accuracy; temperature, humidity, and volatile organic compound (VOC) sensors ensure pharmaceutical cold-chain compliance with 21 CFR Part 11 audit trails. Forklift telemetry including speed, tilt angle, and battery state feeds an XGBoost predictive maintenance model that forecasts battery replacement needs with 93.1% accuracy, eliminating 89% of unplanned downtime events. An ERP-integrated dashboard provides warehouse managers live KPIs. Total inventory shrinkage reduced by 34% and order pick accuracy improved from 97.1% to 99.6% post-deployment.",

  id: 70,
  title: "IoT-Based Smart Environmental Control System",
  domain: "IoT",
  abstract: "An intelligent indoor environmental quality (IEQ) control system integrating distributed CO2, PM2.5, TVOC, temperature, humidity, and illuminance sensors with actuator control over HVAC dampers, air purifiers, and circadian lighting to maintain occupant health and productivity in educational buildings. A model predictive control (MPC) algorithm running on an edge server uses a thermal and air-quality building simulation model to compute optimal actuation sequences 30 minutes ahead. Deployed across 18 classrooms in a university building for one academic semester, the system kept CO2 below 800 ppm 97.3% of occupied time (vs. 61% before deployment), reduced PM2.5 exposure by 58%, and lowered HVAC energy consumption by 22% versus reactive rule-based control, validated against ASHRAE 55 and EN 16798 standards.",

}, {
  id: 71,
  title: "Simple Spam Email Detection System",
  domain: "Machine Learning",
  abstract: "A beginner-friendly spam email classification system built using classical machine learning techniques applied to the well-known Enron and SpamAssassin public datasets. Email bodies and subject lines are preprocessed through tokenisation, stop-word removal, and stemming, then converted into numerical feature vectors using TF-IDF with a 5,000-term vocabulary. Four classifiers — Naive Bayes, Logistic Regression, Support Vector Machine, and Random Forest — are trained and compared. The Naive Bayes model achieves the best balance of speed and accuracy at 97.8% accuracy and 96.4% F1-score on the test set with a training time under 3 seconds on a standard laptop. The project is packaged as a Flask web application where users can paste email text and receive an instant spam or ham prediction with confidence score, making it an ideal introductory project for students beginning their machine learning journey.",

}, {
  id: 72,
  title: "Movie Recommendation System for Beginners",
  domain: "Machine Learning",
  abstract: "An entry-level collaborative and content-based hybrid movie recommendation system implemented using the MovieLens 100K dataset, designed as a learning project for students new to recommender systems. The content-based component uses cosine similarity over TF-IDF genre and keyword vectors; the collaborative filtering component applies matrix factorisation via Singular Value Decomposition (SVD) using the Surprise library. A weighted ensemble of both approaches achieves a Root Mean Square Error (RMSE) of 0.87 and Mean Absolute Error (MAE) of 0.68 on the held-out test set. The project includes a Streamlit web interface where users enter a movie title and receive ten personalised recommendations with poster images fetched from the TMDB public API. Full Jupyter notebook walkthroughs with step-by-step explanations make this project accessible to beginners with only basic Python knowledge.",
  technologies: ["Python", "Scikit-learn", "Surprise SVD", "Streamlit", "TMDB API", "Pandas", "Seaborn"],

}, {
  id: 73,
  title: "Simple Fruit Classification Using Machine Learning",
  domain: "Machine Learning",
  abstract: "A straightforward image-based fruit classification project targeting undergraduate students learning computer vision and machine learning fundamentals. A dataset of 13,599 images across 10 common fruit categories (apple, banana, orange, grape, mango, strawberry, watermelon, pineapple, kiwi, and pear) is collected from Kaggle and preprocessed with resizing, normalisation, and basic augmentation (horizontal flip, rotation). Three approaches are compared: a hand-crafted feature pipeline using HOG descriptors with an SVM classifier (88.3% accuracy), a fine-tuned MobileNetV2 transfer learning model (97.6% accuracy), and a simple custom CNN trained from scratch (93.1% accuracy). The best model is exported to TensorFlow Lite and integrated into a basic Android app that classifies fruit from the phone camera in real time at 24 FPS, providing a tangible end-to-end project experience for learners.",
  technologies: ["Python", "TensorFlow", "MobileNetV2", "OpenCV", "TensorFlow Lite", "Android Studio", "Matplotlib"],

}, {
  id: 74,
  title: "Basic Loan Approval Prediction System",
  domain: "Machine Learning",
  abstract: "A practical introductory machine learning project that predicts personal loan approval outcomes using structured tabular data, designed to teach students end-to-end supervised learning workflows. The publicly available LoanTap and Kaggle Loan Prediction datasets are combined, yielding 45,000 samples with 12 features including applicant income, credit history, loan amount, employment status, and property area. Missing value imputation, label encoding, and MinMax scaling are applied during preprocessing. Six classifiers — Logistic Regression, Decision Tree, Random Forest, K-Nearest Neighbours, Gradient Boosting, and XGBoost — are trained and evaluated. XGBoost achieves the highest AUC-ROC of 0.94 and accuracy of 91.2%. SHAP value explanations visualise which features most influence approval decisions, introducing students to explainable AI concepts. The system is deployed as a simple Streamlit dashboard for interactive prediction.",
  technologies: ["Python", "XGBoost", "Scikit-learn", "SHAP", "Streamlit", "Pandas", "Seaborn"],

  views: 298,

}, {
  id: 75,
  title: "Simple Sentiment Analysis on Product Reviews",
  domain: "Machine Learning",
  abstract: "A beginner-oriented natural language processing project that performs three-class sentiment classification (positive, neutral, negative) on Amazon product reviews using both traditional machine learning and a lightweight deep learning approach. The Amazon Product Review dataset (50,000 samples across electronics, books, and clothing categories) is cleaned through HTML tag removal, contraction expansion, and lemmatisation. A Logistic Regression model with TF-IDF features serves as the baseline at 85.7% accuracy. A fine-tuned DistilBERT model — chosen for its smaller size suitable for learners with limited compute — achieves 92.4% accuracy and 91.8% macro F1-score after 3 epochs of training on a free-tier Google Colab GPU. Aspect-level sentiment extraction identifies which product attributes (price, quality, shipping) drive each review's polarity, adding practical business value. Results are visualised through word clouds, confusion matrices, and a live Gradio demo.",
  technologies: ["Python", "DistilBERT", "Hugging Face", "Scikit-learn", "NLTK", "Gradio", "Google Colab"],

}, {
  id: 76,
  title: "Basic Password Strength Checker System",
  domain: "Cybersecurity",
  abstract: "A beginner-level cybersecurity project that builds an intelligent password strength evaluation system combining rule-based heuristics with a machine learning classifier trained on the RockYou and Have I Been Pwned breach datasets. The rule-based engine scores passwords across eight dimensions: length, uppercase and lowercase balance, digit inclusion, special character presence, sequential pattern detection, dictionary word membership, and keyboard walk identification. A Random Forest classifier trained on 2.3 million labelled password samples (weak, moderate, strong, very strong) achieves 94.1% classification accuracy, outperforming rule-only approaches by 8.6% on adversarial passwords that technically satisfy rules but remain guessable. A real-time entropy estimator based on zxcvbn methodology provides crack-time estimates in seconds, minutes, years, or centuries. The system is deployed as a React web widget with colour-coded strength bars, actionable improvement suggestions, and a password generator module, making it an ideal introductory project for students entering the cybersecurity domain.",
  technologies: ["Python", "Scikit-learn", "Random Forest", "React", "Flask", "zxcvbn", "NLTK"],

}, {
  id: 77,
  title: "Simple File Encryption and Decryption System",
  domain: "Cybersecurity",
  abstract: "A practical introductory cryptography project implementing a secure file encryption and decryption desktop application that exposes students to symmetric and asymmetric encryption fundamentals through hands-on implementation. The system supports AES-256-GCM for high-speed symmetric file encryption, RSA-4096 for asymmetric key exchange, and PBKDF2-HMAC-SHA256 for password-based key derivation with configurable iteration counts. Files of any type and size up to 2 GB are processed with chunked streaming to avoid memory exhaustion. A digital signature module using ECDSA with the P-384 curve provides sender authentication and tamper detection. A drag-and-drop Tkinter GUI guides users through encrypt, decrypt, sign, and verify workflows with progress indicators. Benchmarks show AES-256-GCM throughput of 680 MB/s on a mid-range laptop, and the project is structured as a progressive learning exercise with five difficulty-graded tasks introducing each cryptographic concept in isolation before combining them.",
  technologies: ["Python", "PyCryptodome", "AES-256-GCM", "RSA-4096", "ECDSA", "PBKDF2", "Tkinter"],
  year: 2024,

  views: 318,

}, {
  id: 78,
  title: "Secure Login Authentication System",
  domain: "Cybersecurity",
  abstract: "A beginner-to-intermediate web security project that implements a production-grade multi-factor authentication system demonstrating modern secure login practices to students transitioning from basic web development into application security. The backend built with Node.js and Express implements bcrypt password hashing with cost factor 12, JWT access tokens with 15-minute expiry paired with HTTP-only refresh token rotation, TOTP-based two-factor authentication compatible with Google Authenticator and Authy, and account lockout after five failed attempts with exponential back-off. SQL injection and XSS prevention are enforced through parameterised queries and a strict Content Security Policy. Rate limiting via Redis prevents credential stuffing attacks. A security audit checklist component of the project guides students through OWASP Top 10 vulnerabilities, mapping each implemented control to its corresponding threat. The React frontend includes an accessibility-compliant login form, a QR-code 2FA setup wizard, and a session management dashboard displaying active sessions with remote revocation capability.",
  technologies: ["Node.js", "Express", "bcrypt", "JWT", "TOTP", "Redis", "React", "PostgreSQL"],
  year: 2024,

  views: 345,
  createdAt: "2024-03-01",
  ieeeRef: "IEEE Access"
}, {
  id: 79,
  title: "Basic Network Intrusion Detection System",
  domain: "Cybersecurity",
  abstract: "An introductory network security project that constructs a host-based and network-based intrusion detection system (IDS) using classical machine learning on the NSL-KDD and CICIDS-2017 benchmark datasets, designed to teach students the fundamentals of network traffic analysis and anomaly detection. Raw PCAP files are processed with Scapy to extract 41 NetFlow features including packet rates, byte counts, flag distributions, and connection duration. Four supervised classifiers — Decision Tree, Random Forest, Naive Bayes, and a shallow Neural Network — are trained on labelled attack categories (DoS, Probe, R2L, U2R, and normal traffic). Random Forest achieves the highest detection rate of 98.1% with a false positive rate of 1.4% on the NSL-KDD test set. An unsupervised Isolation Forest model detects novel attack patterns not present in training data with 81.3% recall. A lightweight Python daemon captures live traffic on a local network interface using PyShark, classifies flows in real time, and logs alerts to a local SQLite database with a simple Flask dashboard for visualisation, giving students a fully functional end-to-end IDS they can run on their own network.",
  technologies: ["Python", "Scikit-learn", "Scapy", "PyShark", "Random Forest", "Flask", "SQLite"],
  year: 2024,
  author: "Tariq Mohammed",
  views: 389,
  createdAt: "2024-02-19",
  ieeeRef: "IEEE Access"
}, {
  id: 80,
  title: "Email Phishing Detection System",
  domain: "Cybersecurity",
  abstract: "A practical cybersecurity machine learning project that builds a real-time email phishing detection classifier combining URL feature analysis, email header inspection, and natural language processing of email body content. Three feature groups are engineered: 23 URL-based features including domain age, HTTPS presence, URL length, special character ratio, and redirect count extracted via the WHOIS API; 14 header-based features covering SPF/DKIM/DMARC authentication results, reply-to domain mismatch, and sender reputation score; and TF-IDF bag-of-words features from sanitised email bodies. Trained on the Nazario Phishing Corpus and CSDMC2010 Spam dataset totalling 18,400 labelled emails, a Gradient Boosting classifier achieves 97.3% accuracy, 96.8% precision, and 97.9% recall. An Outlook and Gmail browser-extension prototype flags suspicious emails with a risk score and highlights the specific features triggering the alert, providing transparent explainability for end users. The project is packaged with a step-by-step Jupyter notebook tutorial making it accessible to students with basic Python and NLP knowledge.",
  technologies: ["Python", "Gradient Boosting", "Scikit-learn", "BeautifulSoup", "WHOIS API", "Flask", "JavaScript"],
  year: 2024,
  author: "Leila Ahmadi",
  views: 403,
  createdAt: "2024-04-02",
  ieeeRef: "IEEE Trans. Information Forensics and Security"
}, {
  id: 81,
  title: "Blockchain-Based Simple Voting System",
  domain: "Blockchain",
  abstract: "A beginner-friendly decentralised electronic voting platform built on Ethereum using Solidity smart contracts, designed to introduce students to blockchain fundamentals through a relatable civic application. Each eligible voter is issued a unique wallet address during registration; votes are cast as on-chain transactions that are permanently recorded, publicly auditable, and cryptographically tamper-proof. The smart contract enforces one-vote-per-address, enforces election start and end timestamps, and emits events for real-time result tallying without a trusted central authority. A Merkle tree commitment scheme anonymises voter identity while preserving verifiability. The React and Web3.js frontend connects to MetaMask for transaction signing and displays live candidate standings via Chart.js. Tested on the Sepolia Ethereum testnet with 500 simulated voters, the system processes each vote in under 14 seconds at a gas cost of approximately 0.0003 ETH. Full Hardhat test suite with 98% branch coverage is included, making this an ideal first smart contract project for computer science students.",
  technologies: ["Solidity", "Ethereum", "Hardhat", "Web3.js", "React", "MetaMask", "Chart.js"],
  year: 2024,
  author: "Kwame Boateng",
  views: 334,
  createdAt: "2024-01-18",
  ieeeRef: "IEEE Access"
}, {
  id: 82,
  title: "Blockchain-Based Academic Certificate Verification System",
  domain: "Blockchain",
  abstract: "A decentralised academic credential issuance and verification platform that eliminates certificate fraud by anchoring cryptographic hashes of university degrees, transcripts, and diplomas onto the Polygon PoS blockchain. Universities interact with an institution-facing portal to upload certificate metadata — student name, degree title, graduation date, and GPA — which is hashed using SHA-256 and stored via a Solidity smart contract alongside the issuing institution's ECDSA digital signature. Graduates receive a shareable QR code linking to their on-chain record; employers and institutions scan the QR code to retrieve and verify the credential in under three seconds without contacting the university. IPFS stores the full PDF certificate linked to the on-chain hash, ensuring document permanence. A pilot deployment with a regional university issued 1,200 certificates across two graduation cohorts; verification requests from 47 employers confirmed 100% detection of three tampered certificate samples submitted during red-team testing. The system reduces manual verification turnaround from five business days to instant.",
  technologies: ["Solidity", "Polygon", "IPFS", "SHA-256", "ECDSA", "React", "Node.js"],
  year: 2024,
  author: "Priya Menon",
  views: 412,
  createdAt: "2024-02-14",
  ieeeRef: "IEEE Access"
}, {
  id: 83,
  title: "Blockchain-Based Secure File Storage System",
  domain: "Blockchain",
  abstract: "A decentralised, end-to-end encrypted file storage system combining IPFS for distributed content-addressed storage with Ethereum smart contracts for access-control enforcement, designed as an educational project demonstrating the synergy between blockchain and peer-to-peer storage networks. Files are encrypted client-side using AES-256-GCM before upload; the AES key is then encrypted with the recipient's RSA-2048 public key and stored in the smart contract alongside the IPFS CID. Ownership transfer and permission granting are executed as on-chain transactions, creating an immutable audit trail. A file integrity checker computes and verifies SHA-256 hashes against on-chain records at download time. The React and Ethers.js frontend provides a familiar cloud-storage-like drag-and-drop interface. Benchmarked with files ranging from 1 KB to 500 MB, the system achieves upload throughput of 4.2 MB/s and download of 6.8 MB/s on a 100 Mbps connection. The project is structured into five progressive milestones guiding students from basic IPFS interaction through to full smart-contract-gated access control.",
  technologies: ["Solidity", "Ethereum", "IPFS", "AES-256-GCM", "RSA-2048", "React", "Ethers.js"],
  year: 2024,
  author: "Daniel Park",
  views: 298,
  createdAt: "2024-03-07",
  ieeeRef: "IEEE Access"
}, {
  id: 84,
  title: "Blockchain-Based Digital Identity Verification System",
  domain: "Blockchain",
  abstract: "A self-sovereign identity (SSI) platform built on Hyperledger Indy that enables individuals to own, manage, and selectively disclose their digital credentials without reliance on centralised identity providers. The system implements the W3C Decentralised Identifiers (DID) v1.0 and Verifiable Credentials (VC) standards. Identity issuers — such as government agencies or universities — publish credential schemas and definitions to the Indy ledger; holders store credentials in an Aries-compatible mobile wallet; verifiers request proofs that are validated against the ledger without accessing the issuer. A zero-knowledge proof mechanism allows holders to prove attributes (e.g., age over 18) without revealing the underlying value, preserving privacy. The Hyperledger Aries Cloud Agent Python backend handles DIDComm v2 messaging between parties. Evaluated in a simulated KYC workflow for a fintech application with 300 test users, the system completed identity verification in an average of 8.4 seconds end-to-end with zero data leakage to the verifying party, demonstrating practical compliance with GDPR data minimisation principles.",
  technologies: ["Hyperledger Indy", "Hyperledger Aries", "W3C DID", "Verifiable Credentials", "Zero-Knowledge Proofs", "Python", "React Native"],
  year: 2024,
  author: "Sofia Eriksson",
  views: 367,
  createdAt: "2024-02-28",
  ieeeRef: "IEEE Trans. Dependable and Secure Computing"
}, {
  id: 85,
  title: "Blockchain-Based Simple Payment Transaction System",
  domain: "Blockchain",
  abstract: "A beginner-oriented decentralised payment application built on Ethereum that introduces students to the full lifecycle of a blockchain transaction — from wallet creation and key management through to smart-contract-mediated value transfer and on-chain settlement. The system implements an ERC-20 utility token contract for peer-to-peer token transfers and a payment escrow smart contract that holds funds until delivery confirmation, protecting both buyer and seller without an intermediary. A multi-signature wallet contract requires two-of-three authorised signatures for high-value transactions, demonstrating threshold security. The React Native mobile frontend integrates WalletConnect for QR-code-based payment initiation; transaction history is indexed by The Graph protocol for fast querying without running a full node. Deployed on the Sepolia testnet and stress-tested with 1,000 concurrent simulated transactions, the system maintains consistent 12-second finality and correctly enforces all escrow conditions across 250 test purchase scenarios. Gas optimisation techniques — struct packing, events over storage, and batch transfers — reduce average transaction cost by 42% compared to the naive implementation, providing students with practical Solidity optimisation skills.",
  technologies: ["Solidity", "ERC-20", "WalletConnect", "React Native", "The Graph", "Hardhat", "Ethers.js"],
  year: 2024,
  author: "Amara Diallo",
  views: 356,
  createdAt: "2024-04-12",

}, {
  id: 86,
  title: "Cloud-Based File Storage and Sharing System",
  domain: "Cloud Computing",
  abstract: "A beginner-level cloud application project that builds a fully functional personal file storage and sharing platform inspired by Dropbox and Google Drive, deployed on AWS free-tier services to give students practical exposure to core cloud infrastructure. Files uploaded via the React web frontend are stored in Amazon S3 with server-side AES-256 encryption; metadata including filename, size, owner, and upload timestamp is persisted in Amazon RDS MySQL. A Node.js and Express REST API handles authentication via JWT, file upload and download via pre-signed S3 URLs, and folder hierarchy management. Shareable links with configurable expiry durations are generated using S3 pre-signed URL policies. AWS CloudFront CDN reduces download latency for globally distributed users by 61% in benchmark tests. Auto-scaling via AWS Elastic Beanstalk handles traffic spikes without manual intervention. Deployed and load-tested with 200 concurrent users uploading and downloading files averaging 15 MB, the system maintains sub-2-second response times at 99.4% availability over a 30-day monitoring window, making it an ideal first cloud project for students learning AWS fundamentals.",
  technologies: ["AWS S3", "AWS RDS", "Node.js", "Express", "React", "JWT", "AWS CloudFront", "Elastic Beanstalk"],
  year: 2024,
  author: "Kevin Odhiambo",
  views: 312,
  createdAt: "2024-01-25",
  ieeeRef: "IEEE Access"
}, {
  id: 87,
  title: "Cloud-Based Student Management System",
  domain: "Cloud Computing",
  abstract: "A comprehensive cloud-native student information system built on Google Cloud Platform that centralises academic record management, course enrolment, grade tracking, and timetable scheduling for educational institutions. The microservices architecture deploys five independent services — authentication, student profiles, course management, grade records, and notifications — as Docker containers orchestrated by Google Kubernetes Engine. Each service uses Cloud Firestore for its own data store, following the database-per-service pattern. A React web portal serves administrators, faculty, and students with role-based access control enforced by Firebase Authentication and custom IAM claims. Bulk student data import via CSV is processed asynchronously using Cloud Pub/Sub and Cloud Functions, handling 10,000-record batches in under 90 seconds. Automated email and SMS notifications for grade publication and enrolment deadlines are dispatched via SendGrid and Twilio integrations. The system was piloted at a 2,400-student college over one semester, processing 38,000 grade entries and 14,600 enrolment transactions with 99.97% uptime and full FERPA compliance through field-level encryption of sensitive records.",
  technologies: ["Google Kubernetes Engine", "Cloud Firestore", "React", "Firebase Auth", "Cloud Pub/Sub", "Docker", "SendGrid"],
  year: 2024,
  author: "Aisha Balogun",
  views: 287,
  createdAt: "2024-02-10",
  ieeeRef: "IEEE Access"
}, {
  id: 88,
  title: "Cloud-Based Online Attendance Management System",
  domain: "Cloud Computing",
  abstract: "A scalable cloud attendance tracking platform that replaces paper registers and standalone desktop software with a real-time, multi-device system hosted on Microsoft Azure, designed as an introductory cloud project demonstrating serverless and PaaS service integration. Faculty mark attendance through a React Progressive Web App using QR-code scanning or manual roll-call; students check in by scanning a time-limited rotating QR code generated per class session, preventing proxy attendance. Azure Functions serverless backend processes attendance events and persists records to Azure Cosmos DB with a globally distributed, multi-region write configuration ensuring sub-10ms write latency. Power BI Embedded dashboards give department heads real-time visualisation of attendance trends, defaulter lists, and subject-wise statistics. Automated absentee alerts are sent via Azure Communication Services email and SMS when a student's attendance drops below a configurable threshold. Piloted across 12 departments and 4,800 students over one full academic semester, the system recorded 1.2 million attendance events with zero data loss and reduced administrative reconciliation time by 76% compared to the previous manual process.",
  technologies: ["Azure Functions", "Azure Cosmos DB", "React PWA", "Power BI Embedded", "Azure Communication Services", "Node.js", "Docker"],
  year: 2024,
  author: "Raj Krishnamurthy",
  views: 298,
  createdAt: "2024-03-03",
  ieeeRef: "IEEE Access"
}, {
  id: 89,
  title: "Cloud-Based Digital Library System",
  domain: "Cloud Computing",
  abstract: "A feature-rich digital library platform deployed on AWS that enables universities and public libraries to host, catalogue, and circulate e-books, research papers, and multimedia resources to authenticated patrons through a responsive web and mobile interface. The Spring Boot Java backend exposes a RESTful API serving metadata queries against an Elasticsearch index of 250,000 catalogued items, delivering full-text search results with sub-100ms latency. PDF and EPUB files are stored in Amazon S3 with DRM-lite watermarking embedding the borrower's identity into each download. A recommendation engine using collaborative filtering suggests related titles based on borrowing history, achieving a click-through rate of 34% in A/B testing against a popularity-based baseline. Borrowing, reservation, and return workflows enforce concurrent loan limits via optimistic locking in Amazon Aurora PostgreSQL. An AWS Lambda function generates overdue notices and computes fine amounts nightly. Deployed for a 15,000-patron university library, the system handled a peak of 3,200 simultaneous sessions during examination period with consistent sub-1.5-second page loads served via CloudFront.",
  technologies: ["AWS S3", "Amazon Aurora", "Elasticsearch", "Spring Boot", "React", "AWS Lambda", "CloudFront"],
  year: 2024,
  author: "Mei Xiao",
  views: 276,
  createdAt: "2024-02-22",
  ieeeRef: "IEEE Access"
}, {
  id: 90,
  title: "Cloud-Based Online Quiz System",
  domain: "Cloud Computing",
  abstract: "An adaptive cloud-hosted quiz and assessment platform built on Google Cloud Platform that supports timed examinations, auto-grading, anti-cheating controls, and detailed performance analytics for educational institutions and corporate training programmes. The Vue.js frontend renders randomised question sets drawn from a Cloud Firestore question bank of 8,000 items across 14 subject domains; question order and option order are shuffled per candidate to deter copying. A Cloud Functions backend enforces strict server-side timing, rejecting late submissions and logging focus-loss events as potential integrity violations. Auto-grading of MCQ and true/false questions delivers instant results; short-answer questions are scored using a fine-tuned BERT semantic similarity model hosted on Cloud Run. Detailed post-quiz analytics break down performance by topic, difficulty tier, and time-per-question, highlighting knowledge gaps for personalised remediation. Load-tested with 1,500 concurrent examinees sitting a 60-question, 90-minute exam, the system maintained 99.9% availability with p95 question-load latency of 210ms. Role-based portals serve students, instructors, and administrators with appropriate data scopes.",
  technologies: ["Google Cloud Functions", "Cloud Firestore", "Vue.js", "Cloud Run", "BERT", "BigQuery", "Firebase Auth"],
  year: 2024,
  author: "Carlos Herrera",
  views: 324,
  createdAt: "2024-03-19",
  ieeeRef: "IEEE Access"
}, {
  id: 91,
  title: "Cloud-Based Document Management System",
  domain: "Cloud Computing",
  abstract: "An enterprise-grade cloud document management system deployed on Microsoft Azure that provides centralised storage, version control, full-text search, collaborative editing, and automated approval workflows for organisations transitioning from on-premises file servers. Documents are stored in Azure Blob Storage with immutable versioning enabled; every save operation creates a new version with author, timestamp, and change-summary metadata persisted in Azure SQL Database. Azure Cognitive Search indexes document contents — including scanned PDFs processed by Azure Form Recogniser OCR — enabling full-text search across 500,000 documents with sub-300ms query response. A configurable multi-stage approval workflow engine built with Azure Logic Apps routes documents through reviewer chains, sending Microsoft Teams notifications at each stage. AES-256 envelope encryption with customer-managed keys in Azure Key Vault meets ISO 27001 and GDPR Article 25 data protection requirements. Piloted by a 350-employee professional services firm, the system reduced document retrieval time from an average of 4.2 minutes to 8 seconds and eliminated version conflicts that had previously affected 23% of collaboratively edited documents.",
  technologies: ["Azure Blob Storage", "Azure SQL", "Azure Cognitive Search", "Azure Logic Apps", "React", "Azure Key Vault", "Docker"],
  year: 2024,
  author: "Hannah Müller",
  views: 289,
  createdAt: "2024-04-08",
  ieeeRef: "IEEE Access"
}, {
  id: 92,
  title: "Cloud-Based Simple Backup and Restore System",
  domain: "Cloud Computing",
  abstract: "A beginner-to-intermediate cloud project that implements an automated, incremental backup and point-in-time restore service for files and databases hosted on AWS, teaching students the fundamentals of disaster recovery, data durability, and cloud storage economics. The Python backup agent installed on source machines scans designated directories, computes SHA-256 file hashes to detect changes, and uploads only modified blocks to Amazon S3 using multipart upload for files exceeding 100 MB — reducing daily backup data volume by 73% compared to full backups. Database snapshots for MySQL and PostgreSQL are taken via automated RDS snapshots and exported to S3 Glacier Instant Retrieval for cost-effective long-term retention at $0.004 per GB per month. A restore wizard in the React dashboard allows users to browse backup snapshots by date and time, preview directory trees, and initiate selective file or full-volume restores with progress tracking. AWS SNS delivers email and SMS alerts for backup success, failure, and storage threshold breaches. Tested across 10 EC2 instances backing up a combined 2.3 TB of data nightly, the system completed all backups within the four-hour maintenance window and successfully restored 47 of 47 file and database restore scenarios in validation testing.",
  technologies: ["AWS S3", "AWS S3 Glacier", "AWS RDS", "Python", "React", "AWS SNS", "AWS Lambda"],
  year: 2024,
  author: "Tobias Larsen",
  views: 265,
  createdAt: "2024-04-22",
  ieeeRef: "IEEE Access"
}, {
  id: 93,
  title: "Line Following Robot",
  domain: "Robotics",
  abstract: "A beginner robotics project that designs and builds an autonomous line-following robot using an Arduino Uno microcontroller and an array of five infrared reflectance sensors to detect and track a black line on a white surface. The sensor array samples reflected IR intensity at 50 Hz; a proportional-integral-derivative (PID) control algorithm computes steering corrections in real time, dynamically adjusting the PWM duty cycle of two DC gear motors driven by an L298N H-bridge motor driver to maintain the robot centred on the line. PID gain parameters (Kp=1.2, Ki=0.04, Kd=0.8) were tuned experimentally using the Ziegler-Nichols method on a standardised oval test track with 90-degree corners and a figure-of-eight crossing. The robot achieves a lap time of 8.3 seconds on the 3-metre test course at a peak speed of 0.42 m/s with zero line departures across 50 consecutive laps. Power is supplied by a 7.4 V 2000 mAh LiPo battery providing approximately 45 minutes of continuous operation. The complete build is documented with circuit schematics, PCB layout files, and fully commented Arduino sketches, making it a comprehensive first hardware-software integration project for students entering embedded systems and robotics.",
  technologies: ["Arduino Uno", "IR Sensors", "L298N Motor Driver", "PID Control", "C++", "PWM", "LiPo Battery"],
  year: 2024,
  author: "Raj Patel",
  views: 289,
  createdAt: "2024-01-14",
  ieeeRef: "IEEE Access"
}, {
  id: 94,
  title: "Obstacle Avoiding Robot Using Sensors",
  domain: "Robotics",
  abstract: "An introductory autonomous mobile robot project that implements reactive obstacle avoidance using a rotating ultrasonic sensor mounted on a servo motor, enabling the robot to navigate unknown indoor environments without a pre-built map. The Arduino Mega controller polls the HC-SR04 ultrasonic sensor at 20 Hz, scanning left, centre, and right at 45-degree intervals by commanding the SG90 servo. A finite state machine governs four behaviours — forward cruise, slow approach, stop-and-scan, and turn-away — transitioning based on distance thresholds configurable via serial monitor. When an obstacle is detected within 20 cm, the robot halts, surveys all three directions, and selects the heading with the greatest clearance. Two 12V DC motors with rubber-tyred wheels are independently controlled via an L298N dual H-bridge, enabling differential steering with turning radii as tight as 0 cm. Tested in a 4×4 metre room furnished with 14 randomly placed obstacles over 30 trials, the robot successfully navigated from start to goal without collision in 28 of 30 runs (93.3% success rate) at an average traversal speed of 0.28 m/s. An optional Bluetooth module allows real-time distance readings to be streamed to a serial monitor for debugging.",
  technologies: ["Arduino Mega", "HC-SR04 Ultrasonic", "SG90 Servo", "L298N Motor Driver", "C++", "Bluetooth HC-05", "FSM Control"],
  year: 2024,
  author: "Amina Yusuf",

  createdAt: "2024-02-03",
  ieeeRef: "IEEE Access"
}, {
  id: 95,
  title: "Bluetooth Controlled Robot Car",
  domain: "Robotics",
  abstract: "A hands-on beginner robotics project that constructs a four-wheeled robot car controlled wirelessly via Bluetooth from an Android smartphone, introducing students to serial communication protocols, motor control, and mobile app development simultaneously. The Arduino Uno receives ASCII command characters (F, B, L, R, S for forward, backward, left, right, stop) from a paired HC-05 Bluetooth module at 9600 baud and maps each command to corresponding PWM signals on an L298N dual H-bridge driving four 6V DC geared motors in a skid-steering configuration. A companion Android app built with MIT App Inventor features a virtual joystick, discrete direction buttons, and a speed slider that encodes PWM percentage in the transmitted command byte, providing variable speed control between 40% and 100% duty cycle. Effective Bluetooth range is 9.4 metres in open space and 6.1 metres through a single wall, measured during range testing. Battery runtime of 55 minutes is achieved from a 9V 1800 mAh NiMH pack. An ultrasonic front sensor adds an optional autonomous collision-stop safety mode that overrides Bluetooth commands when an obstacle is detected within 15 cm, demonstrating the integration of manual and autonomous control modes in a single embedded system.",
  technologies: ["Arduino Uno", "HC-05 Bluetooth", "L298N Motor Driver", "MIT App Inventor", "Android", "C++", "HC-SR04"],
  year: 2024,

  createdAt: "2024-02-20",
  ieeeRef: "IEEE Access"
}, {
  id: 96,
  title: "Voice Controlled Robot",
  domain: "Robotics",
  abstract: "A voice-commanded mobile robot project that processes natural spoken instructions to navigate and perform actions, bridging speech recognition, natural language parsing, and real-time embedded motor control in a single student-accessible system. An Android smartphone running a custom MIT App Inventor application leverages the device's on-board Google Speech Recognition API to convert utterances such as 'move forward', 'turn left', 'stop', and 'spin' into command strings transmitted via Bluetooth to an Arduino Mega controller. The Arduino parses incoming strings using a keyword-matching state machine, tolerating minor word-order variations, and drives four DC motors through a dual L298N motor driver stack. A confidence-threshold filter rejects recognitions below 70% confidence to prevent miscommand execution. In evaluation across 200 test utterances in a quiet indoor environment the system correctly executed 191 commands (95.5% accuracy); accuracy dropped to 87.3% in a moderately noisy cafeteria environment, highlighting practical limitations discussed in the project report. An OLED display mounted on the chassis echoes the last recognised command for visual confirmation. The project is structured as a six-session workshop guiding students from basic serial communication through full voice-command integration, requiring no prior robotics experience.",
  technologies: ["Arduino Mega", "Google Speech API", "MIT App Inventor", "HC-05 Bluetooth", "L298N Motor Driver", "OLED Display", "C++"],

}, {
  id: 97,
  title: "Smart Dustbin Robot Using Sensors",
  domain: "Robotics",
  abstract: "An intelligent autonomous waste-collection robot designed for indoor environments such as office floors and university corridors, combining ultrasonic proximity detection, IR-based waste presence sensing, and differential-drive navigation to locate, approach, and signal waste collection without human intervention. The Arduino Mega brain coordinates three subsystems: a front-facing HC-SR04 obstacle avoidance module, a pair of downward-pointing IR sensors that detect waste items on the floor by reflectance contrast, and a servo-actuated lid mechanism that opens the dustbin compartment upon confirmed waste detection within 8 cm. A wall-following algorithm using two side-mounted ultrasonic sensors enables systematic room coverage using a modified boustrophedon path planning strategy. When the internal load cell sensor detects the bin compartment has reached 80% capacity, an HC-05 Bluetooth module transmits a full-bin alert to a companion Android app, and a buzzer and red LED provide local indication. Tested in a 6×8 metre furnished office environment over 15 autonomous cleaning sessions, the robot collected 94.7% of 150 placed waste items and completed full-room coverage in an average of 12.4 minutes on a single 2000 mAh LiPo charge providing 40 minutes of runtime.",
  technologies: ["Arduino Mega", "HC-SR04", "IR Sensors", "Load Cell", "Servo Motor", "HC-05 Bluetooth", "C++"],

  views: 276,
  createdAt: "2024-03-25",

}, {
  id: 98,
  title: "Fire Fighting Robot Using Arduino",
  domain: "Robotics",
  abstract: "An autonomous fire-detection and suppression robot designed as a safety-focused embedded systems project that locates flame sources in a structured indoor environment and activates a water-pump extinguisher without human intervention. Three UV-Vis flame sensors arranged in a 120-degree arc provide directional fire detection with a 60-degree field of view each; the Arduino Uno steers the robot toward the highest-intensity flame signal using a proportional controller while continuously monitoring all three sensors. Upon closing to within 10 cm of the flame — confirmed by a temperature threshold reading from an MLX90614 non-contact IR thermometer exceeding 80°C — a 5V mini submersible water pump driven via a MOSFET relay activates for a two-second burst, then re-scans for residual flame. The robot navigates using two encoder-equipped DC motors and an L298N driver, with wheel encoders providing odometry for precise distance-to-flame estimation. Safety interlocks prevent pump activation if no flame is confirmed by at least two sensors simultaneously, eliminating false discharges. Tested in a standardised firefighting robot competition arena (1.2 m × 1.2 m maze) with a single candle flame, the robot successfully located and extinguished the flame in 100% of 20 trials with a mean response time of 18.7 seconds from arena entry.",
  technologies: ["Arduino Uno", "UV Flame Sensors", "MLX90614 IR Thermometer", "L298N Motor Driver", "Water Pump", "MOSFET Relay", "C++"],
  year: 2024,

  createdAt: "2024-04-05",

  title: "Gesture Controlled Robot",
  domain: "Robotics",
  abstract: "A gesture-commanded wireless robot that interprets the operator's hand movements captured by an MPU-6050 six-axis IMU accelerometer-gyroscope worn on a glove to drive a four-wheeled robot car in real time, introducing students to inertial sensing, wireless communication, and gesture classification in a single integrated project. The transmitter unit — a glove-mounted Arduino Nano sampling the MPU-6050 at 100 Hz — applies a complementary filter to fuse accelerometer and gyroscope data into stable roll and pitch angles. Gesture mapping rules translate roll right (>25°) to right turn, roll left (>25°) to left turn, pitch forward (>20°) to forward motion, pitch backward (>20°) to reverse, and neutral (all angles within ±10°) to stop; an nRF24L01 2.4 GHz radio module transmits the gesture class and speed magnitude to the robot receiver at 50 packets per second with end-to-end latency of 22 ms. The robot unit decodes received packets on a second Arduino Nano and drives four DC motors via an L298N H-bridge with speed proportional to tilt angle magnitude, providing intuitive variable-speed control. Wireless range of 85 metres was achieved in open-air testing. Across 300 gesture classification trials covering all five command classes the system achieved 96.7% correct command execution, demonstrating the viability of IMU-based gesture interfaces for intuitive robot teleoperation.",
